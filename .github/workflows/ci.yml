name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test-build:
    name: eslint + tsc + vitest + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # React 19 / Vite 8 / Vitest 3 all require Node >= 20. Lock the minor
          # so CI and local match the same behaviour across toolchains.
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        # Use `npm install` on first runs until package-lock.json is regenerated
        # locally with `npm install` including the new vitest dev dependency.
        # TODO (Patch 2N follow-up): switch back to `npm ci` once lockfile is
        # committed fresh — ci fails fast on lockfile drift, which is what we want.
        run: npm install --no-audit --no-fund

      - name: eslint
        run: npm run lint

      - name: TypeScript type-check
        # `npm run build` invokes `tsc -b && vite build` in one shot, so tsc
        # runs anyway. We run `tsc --noEmit` separately so that a TS-only
        # failure surfaces before (potentially slow) Vite bundling starts.
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Vitest (unit tests)
        # `test:ci` runs vitest in non-watch mode + machine-readable reporter.
        # Added in package.json as part of Patch 2N.
        run: npm run test:ci

      - name: vite build
        # Catches regressions that pass tsc+lint+vitest but break real bundling
        # (e.g. dynamic imports that resolve differently in prod).
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: frontend-dist
          path: dist/
          retention-days: 3
